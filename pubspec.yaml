publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0' # Hardened for modern stability

dependencies:
  flutter:
    sdk: flutter
  
  # SOVEREIGN DATA LAYER (Replacing Cloud with Local-First)
